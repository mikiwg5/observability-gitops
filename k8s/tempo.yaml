apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: monitoring

spec:
  replicas: 1

  selector:
    matchLabels:
      app: tempo

  template:
    metadata:
      labels:
        app: tempo

    spec:
      containers:
        - name: tempo
          image: grafana/tempo:latest

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault

          args:
            - -config.file=/etc/tempo/tempo.yaml

          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 4318

          volumeMounts:
            - name: tempo-config
              mountPath: /etc/tempo

      volumes:
        - name: tempo-config
          configMap:
            name: tempo-config

---
apiVersion: v1
kind: ConfigMap

metadata:
  name: tempo-config
  namespace: monitoring

data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/traces
        wal:
          path: /tmp/tempo/wal

---
apiVersion: v1
kind: Service

metadata:
  name: tempo
  namespace: monitoring

spec:
  selector:
    app: tempo

  ports:
    - name: http
      port: 3200
      targetPort: 3200

    - name: otlp-grpc
      port: 4317
      targetPort: 4317

    - name: otlp-http
      port: 4318
      targetPort: 4318
